# ─────────────────────────────────────────────────────────────────────────────
# cd.yml — Continuous Deployment
#
# Runs ONLY after the CI workflow completes successfully on main.
# SSHs into the EC2 server, pulls the latest images from GHCR,
# and restarts the containers with zero-downtime.
#
# This workflow only runs on pushes to main — never on PRs.
# ─────────────────────────────────────────────────────────────────────────────

name: CD

on:
  # Trigger only when the CI workflow completes successfully
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    # Double-check that the triggering CI run actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Copy docker-compose.yml to EC2 so the server uses the latest version
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.yml,init.sql"
          target:   "/home/ubuntu/url-shortener"

      # SSH into EC2 and run deployment commands
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Move into the project directory
            cd /home/ubuntu/url-shortener

            # Log in to GHCR from the EC2 server
            # GHCR_TOKEN is stored as an environment variable on EC2 (set in Phase 6)
            echo $GHCR_TOKEN | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            # Pull the latest images from GHCR
            # This is fast because Docker only downloads changed layers
            docker compose pull

            # Restart containers with the new images.
            # --remove-orphans cleans up containers for removed services.
            # -d runs in detached (background) mode.
            docker compose up -d --remove-orphans

            # Remove old dangling images to free up disk space
            docker image prune -f

            # Verify deployment — health check must return 200
            sleep 10
            curl -f http://localhost/health || exit 1

            echo "✅ Deployment successful"