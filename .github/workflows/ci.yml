# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Continuous Integration
#
# Runs on every push to main AND every pull request targeting main.
# Jobs run in parallel where possible to keep the pipeline fast.
#
# What it does:
#   1. Lints the backend TypeScript code
#   2. Runs integration tests with real Postgres + Redis (via services)
#   3. Builds both Docker images and verifies they build without errors
#   4. Pushes images to GitHub Container Registry (GHCR)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new push arrives.
# Prevents wasting runner minutes on stale builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Temporary workaround for GHCR auth issue in some actions
  # Image names in GHCR follow the pattern: ghcr.io/OWNER/REPO/SERVICE
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/url-shortener-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/url-shortener-web

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: url-shortener-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: url-shortener-backend
        run: npm ci

      # TypeScript compiler check — catches type errors without running code
      - name: TypeScript type check
        working-directory: url-shortener-backend
        run: npx tsc --noEmit

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    # Service containers run alongside the test job.
    # GitHub Actions starts these before your steps run —
    # just like docker compose but managed by GitHub.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       url_shortener
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        # Wait until Postgres is ready before running tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: url-shortener-backend/package-lock.json

      - name: Install dependencies
        working-directory: url-shortener-backend
        run: npm ci

      # init.sql creates the urls table — tests need this to exist
      - name: Run database migrations
        working-directory: url-shortener-backend
        env:
          PGPASSWORD: testpassword
        run: psql -h localhost -U postgres -d url_shortener -f init.sql

      - name: Run tests
        working-directory: url-shortener-backend
        env:
          NODE_ENV:    test
          PORT:        3000
          BASE_URL:    http://localhost:3000
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_USER:     postgres
          DB_PASSWORD: testpassword
          DB_NAME:     url_shortener
          REDIS_HOST:  localhost
          REDIS_PORT:  6379
          CACHE_TTL_SECONDS: 3600
          JWT_SECRET:  test_jwt_secret
        run: npm test

  # ── Job 3: Build & Push Docker images ──────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    # Only push images when code lands on main (not on PRs from forks)
    # PRs still build images to verify they compile — just don't push them
    needs: [lint, test]   # only runs if lint AND test pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Enables advanced Docker features like inline cache and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the token stored in GitHub Secrets
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Generate image tags automatically:
      #   - ghcr.io/user/url-shortener-api:latest   (always)
      #   - ghcr.io/user/url-shortener-api:sha-abc1234  (git commit sha)
      # The commit sha tag lets you roll back to any exact build later.
      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Extract metadata for Web image
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # Build API image with layer caching.
      # cache-from/to means Docker reuses layers from the previous build
      # stored in the registry — dramatically speeds up rebuilds.
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./url-shortener-backend
          dockerfile: ./url-shortener-backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:cache
          cache-to:   type=registry,ref=${{ env.API_IMAGE }}:cache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./url-shortener-frontend
          dockerfile: ./url-shortener-frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:cache
          cache-to:   type=registry,ref=${{ env.WEB_IMAGE }}:cache,mode=max