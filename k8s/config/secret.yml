apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secret
  namespace: default
type: Opaque
# Secret values MUST be base64 encoded.
# Encode your values with: echo -n "your_value" | base64
# Decode to verify:        echo "encoded" | base64 --decode
#
# To generate the values below run these commands:
#   echo -n "your_db_password" | base64
#   echo -n "your_jwt_secret" | base64
#
# NEVER commit real secrets to git.
# In production use AWS Secrets Manager or Sealed Secrets.
stringData:
  # stringData lets you write plain text — K8s encodes it automatically.
  # Use this instead of data: to avoid manual base64 encoding mistakes.
  DB_PASSWORD: "DB_PASSWORD_BASE64_ENCODED"
  JWT_SECRET:  "JWT_SECRET_BASE64_ENCODED"
  REDIS_PASSWORD: ""