apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: default
spec:
  replicas: 1       # always 1 for a database — running 2 would cause data conflicts
  selector:
    matchLabels:
      app: postgres # must match template.metadata.labels below
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            # Reading from ConfigMap
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: url-shortener-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: url-shortener-config
                  key: DB_USER
            # Reading from Secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secret
                  key: DB_PASSWORD
          volumeMounts:
            # Mount the persistent volume at the Postgres data directory
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # readinessProbe — only send traffic when Postgres is actually ready
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          # PersistentVolumeClaim provides durable storage.
          # Data survives pod restarts — unlike emptyDir which is wiped.
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# PersistentVolumeClaim — requests storage from the cluster
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce   # only one pod can write at a time — correct for a DB
  resources:
    requests:
      storage: 1Gi    # 1GB is plenty for development

---
# Service — gives Postgres a stable hostname inside the cluster
# Other pods reach Postgres at: postgres-service:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: default
spec:
  selector:
    app: postgres     # routes traffic to pods with this label
  ports:
    - port: 5432
      targetPort: 5432
  # ClusterIP = only reachable inside the cluster (not from internet)
  # This is correct — Postgres should never be publicly accessible
  type: ClusterIP