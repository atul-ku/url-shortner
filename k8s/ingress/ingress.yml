apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    # Enable regex in nginx ingress
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # API routes
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 3000

          # Health check
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-service
                port:
                  number: 3000

          # Short URL redirect — alphanumeric chars routed to API
          # Using Prefix instead of regex to avoid nginx config issues
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80