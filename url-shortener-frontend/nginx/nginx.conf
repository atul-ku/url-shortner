server {
    listen 80;
    server_name _;

    # ── Static React files ───────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — shrinks JS/CSS by ~70% before sending to browser
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Security headers — same job as helmet() in the API, but at the web layer
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection "1; mode=block"    always;
    add_header Referrer-Policy "strict-origin"     always;

    # ── API proxy ────────────────────────────────────────────────────
    # Any request starting with /api/ or /health is forwarded to the
    # api container. "api" is resolved by Docker's internal DNS —
    # Docker sees the service name in docker-compose.yml and knows
    # which container's IP address to use.
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        # These headers tell the API the real client IP and protocol,
        # because from the API's perspective every request comes from Nginx.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keepalive so Nginx reuses the connection to the API
        # instead of opening a new TCP connection per request
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # Proxy redirect requests to the API too (GET /:code)
    location ~ "^/[a-zA-Z0-9]{7}$$" {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint — used by Docker and AWS load balancers
    location /health {
        proxy_pass http://api:3000/health;
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    # This is the critical rule for React Router.
    # When a user visits /some-page directly or hits refresh,
    # Nginx tries to find that file on disk — it doesn't exist.
    # Without this rule: 404. With it: serve index.html and let
    # React Router handle the path in the browser.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────
    # Vite hashes asset filenames (e.g. main.a3f9c2.js) so we can
    # cache them for a full year safely — if the file changes,
    # the hash changes, forcing the browser to re-download.
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}